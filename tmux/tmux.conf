# ~/.config/tmux/tmux.conf
# Opinionated tmux configuration — no plugins, self-contained.

# =============================================================================
# GENERAL
# =============================================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color passthrough
set -g history-limit 50000
set -g base-index 1            # windows start at 1, not 0
set -g pane-base-index 1       # panes start at 1, not 0
set -g renumber-windows on     # close window 2 of 1-2-3 → becomes 1-2
set -sg escape-time 0          # no ESC delay (important for vim/neovim)
set -g focus-events on         # pass focus events through to applications
set -g mouse on
set -g set-clipboard on

# =============================================================================
# PREFIX  (Ctrl+a — more ergonomic than Ctrl+b)
# =============================================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix           # Ctrl+a Ctrl+a sends literal Ctrl+a

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Reload config in place
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Split panes — intuitive symbols, inherit current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation — vim-style (no prefix needed with -n flag would be too
# aggressive; keep prefix to avoid conflicts with vim splits)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing — repeatable (-r) with 500ms window
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window           # toggle between last two active windows

# =============================================================================
# COPY MODE  (vi)
# =============================================================================
set -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# WSL clipboard — pipe yank through clip.exe when running under WSL
if-shell "grep -qi microsoft /proc/version 2>/dev/null" {
  bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"
  bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
}

# =============================================================================
# STATUS BAR  (Catppuccin Mocha palette — no font glyphs required)
# =============================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Base colors
set -g status-style          "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style         "bg=#1e1e2e,fg=#f38ba8"
set -g message-command-style "bg=#1e1e2e,fg=#89b4fa"

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Window tabs
set -g window-status-style          "fg=#6c7086"
set -g window-status-current-style  "fg=#89b4fa,bold"
set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-separator      ""

# Left: session name
set -g status-left-length 30
set -g status-left  "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa] "

# Right: time and date
set -g status-right-length 40
set -g status-right "#[fg=#6c7086] %H:%M  %d %b "
